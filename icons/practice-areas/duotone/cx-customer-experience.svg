<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- CX — Customer Experience (duotone) -->
  <!-- Primary: #005eb8 | Secondary: #fdda24 -->
  <!-- 48×48 flattened vector — Proto-Lab Design System -->

